<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trabaja con EasyYou - Gestiónate tu propio tiempo</title>
    
    <!-- Integración de Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fuentes (Outfit) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    
    <!-- Iconos de FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Configuración de colores y animaciones -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            cyan: '#00e5ff',
                            blue: '#0047b3',
                            dark: '#001f4d'
                        },
                        whatsapp: {
                            DEFAULT: '#25D366',
                            dark: '#128C7E'
                        }
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-12px)' },
                        }
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 4s ease-in-out infinite',
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            background: linear-gradient(135deg, #00e5ff 0%, #0047b3 100%);
            background-attachment: fixed;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 sm:p-6 antialiased text-gray-800">

    <main class="w-full max-w-3xl glass-card rounded-3xl shadow-[0_20px_50px_rgba(0,0,0,0.3)] overflow-hidden relative">
        
        <div class="h-2 w-full bg-gradient-to-r from-brand-cyan to-brand-blue"></div>

        <div class="p-6 sm:p-10 md:p-12 text-center flex flex-col items-center">
            
            <!-- Logo con animación dinámica -->
            <!-- Nota: En esta vista previa puede que el logo se vea roto si la imagen "logo-1.png" no existe en la web, 
                 pero cuando subas tu archivo logo-1.png a GitHub se verá perfectamente -->
            <div class="animate-float w-full max-w-[300px] mb-8">
                <img src="logo-1.png" 
                     alt="EasyYou Agency Logo" 
                     class="w-full transition-transform duration-300 hover:scale-105 drop-shadow-xl"
                     style="image-rendering: -webkit-optimize-contrast; image-rendering: crisp-edges;">
            </div>

            <!-- Título -->
            <h1 class="text-3xl sm:text-4xl md:text-5xl font-black leading-tight mb-4 text-brand-dark">
                Trabaja con nosotros,<br>
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-500 to-blue-700">
                    gestiónate tu propio tiempo
                </span>
            </h1>

            <!-- Propuesta -->
            <p class="text-xl sm:text-2xl font-semibold text-gray-700 mb-6 max-w-2xl">
                Gana un fijo + comisiones de <span class="font-black text-green-600 border-b-4 border-green-200">+ de 300€</span>.<br>
                <span class="text-lg font-normal text-gray-500 mt-2 block">Nosotros cerramos la llamada por ti.</span>
            </p>

            <!-- Plazas (Urgencia) -->
            <div class="inline-flex items-center bg-red-100 border-2 border-red-200 text-red-600 font-bold py-2 px-6 rounded-full mb-8 animate-pulse-slow shadow-sm text-lg sm:text-xl">
                <i class="fa-solid fa-fire text-orange-500 mr-2"></i>
                ¡Solo 2 plazas disponibles!
            </div>

            <!-- Contenedor del vídeo de YouTube -->
            <div class="w-full rounded-2xl overflow-hidden shadow-2xl mb-10 bg-black relative border-4 border-white/50 aspect-video">
                <iframe 
                    class="w-full h-full absolute top-0 left-0"
                    src="https://www.youtube.com/embed/ydirUu5fWmE" 
                    title="Presentación EasyYou" 
                    frameborder="0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen>
                </iframe>
            </div>

            <!-- Botón WhatsApp -->
            <a href="https://wa.me/34623179849?text=Hola%20soy______.%20Y%20estoy%20interesad%40%20en%20formar%20parte%20de%20EasyYou." 
               target="_blank" 
               rel="noopener noreferrer"
               class="group relative inline-flex items-center justify-center w-full sm:w-auto bg-whatsapp hover:bg-whatsapp-dark text-white font-bold text-xl sm:text-2xl py-5 px-10 rounded-full shadow-[0_10px_25px_rgba(37,211,102,0.4)] transform transition-all duration-300 hover:-translate-y-2 hover:shadow-[0_15px_35px_rgba(37,211,102,0.6)] active:scale-95">
                <i class="fa-brands fa-whatsapp text-3xl sm:text-4xl mr-3 group-hover:rotate-12 transition-transform duration-300"></i>
                <span>Solicitar Puesto Ahora</span>
            </a>

            <!-- Aclaración -->
            <p class="mt-6 text-sm sm:text-base text-gray-500 max-w-lg font-medium">
                <i class="fa-regular fa-clock mr-1"></i>
                Al enviarnos el mensaje, nosotros te diremos lo antes posible las horas disponibles para agendar una llamada corta.
            </p>

        </div>
    </main>

</body>
</html>
